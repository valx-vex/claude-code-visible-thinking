name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check shell scripts
        run: |
          bash -n scripts/*.sh

      - name: Basic docs and helper checks
        run: |
          test -f README.md
          test -f SUPPORT.md
          test -f CONTRIBUTING.md
          test -f docs/VALIDATION.md
          test -f docs/BETA_OPERATIONS.md
          test -f scripts/collect_support_bundle.sh
          ./scripts/collect_support_bundle.sh --help >/dev/null
