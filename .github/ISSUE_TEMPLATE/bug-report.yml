name: Bug report
description: Report a reproducible defect in the scripts, docs, or validation path.
title: "[bug] "
labels:
  - beta
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Claude Code version
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
